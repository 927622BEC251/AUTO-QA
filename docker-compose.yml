version: '3.8'

services:
  autoqa-pro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoqa-pro
    volumes:
      - .:/workspace
      - ~/.m2:/root/.m2
    environment:
      - MAVEN_OPTS=-Xmx1024m
      - DISPLAY=:99
    working_dir: /workspace
    command: mvn clean test

  # Optional: Selenium Hub for distributed testing
  selenium-hub:
    image: selenium/hub:4.20.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    environment:
      GRID_MAX_SESSION: 10
      GRID_BROWSER_TIMEOUT: 300
      GRID_TIMEOUT: 300

  # Optional: Chrome Node
  chrome-node:
    image: selenium/node-chrome:4.20.0
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_INSTANCES: 5
      SE_NODE_MAX_SESSION: 5
      SE_START_XVFB: "false"
      SE_SCREEN_WIDTH: 1920
      SE_SCREEN_HEIGHT: 1080
    ports:
      - "6900:5900"

  # Optional: Firefox Node
  firefox-node:
    image: selenium/node-firefox:4.20.0
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_INSTANCES: 5
      SE_NODE_MAX_SESSION: 5
      SE_START_XVFB: "false"
      SE_SCREEN_WIDTH: 1920
      SE_SCREEN_HEIGHT: 1080
    ports:
      - "6901:5900"
